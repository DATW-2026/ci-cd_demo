name: Demo Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test:c

      - name: Build project
        run: npm run build

      # - name: Deploy to production
      #   if: github.ref == 'refs/heads/main'
      #   run: echo "Deploying to production..." # Replace with actual deployment command
